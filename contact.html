<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact – Tim 4</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --cyan:        #00f5ff;
      --cyan-dim:    #00c8d4;
      --blue-deep:   #0a0e1a;
      --blue-mid:    #0d1b2a;
      --blue-panel:  #0f2233;
      --blue-card:   #112640;
      --glow:        0 0 20px rgba(0,245,255,0.35);
      --glow-strong: 0 0 40px rgba(0,245,255,0.6);
      --text-main:   #e0f4ff;
      --text-muted:  #7eb8d4;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--blue-deep);
      color: var(--text-main);
      font-family: 'Rajdhani', sans-serif;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent, transparent 2px,
        rgba(0,245,255,0.018) 2px, rgba(0,245,255,0.018) 4px
      );
      pointer-events: none; z-index: 9999;
    }

    .grid-bg {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,245,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,255,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridMove 20s linear infinite;
      pointer-events: none; z-index: 0;
    }
    @keyframes gridMove {
      0%   { background-position: 0 0, 0 0; }
      100% { background-position: 0 60px, 60px 0; }
    }

    .particles { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
    .particle {
      position: absolute; width: 2px; height: 2px;
      background: var(--cyan); border-radius: 50%;
      opacity: 0; animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(100vh); opacity: 0; }
      10%  { opacity: 0.7; }
      90%  { opacity: 0.7; }
      100% { transform: translateY(-10vh) translateX(30px); opacity: 0; }
    }

    /* HEADER */
    header {
      position: fixed; width: 100%; top: 0; left: 0;
      background: rgba(10,14,26,0.88);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(0,245,255,0.15);
      padding: 16px 60px;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 1000;
    }
    header h1 {
      font-family: 'Orbitron', monospace;
      font-size: 18px; font-weight: 900;
      color: var(--cyan); text-shadow: var(--glow); letter-spacing: 4px;
    }
    nav { display: flex; gap: 8px; }
    nav a {
      color: var(--text-muted); padding: 6px 16px;
      text-decoration: none; font-family: 'Orbitron', monospace;
      font-size: 11px; letter-spacing: 2px; font-weight: 700;
      border: 1px solid transparent; border-radius: 4px; transition: all 0.3s;
    }
    nav a:hover, nav a.active {
      color: var(--cyan);
      border-color: rgba(0,245,255,0.3);
      background: rgba(0,245,255,0.06);
      text-shadow: var(--glow);
    }

    /* SECTION */
    section {
      position: relative; z-index: 2; padding-top: 80px;
      min-height: 100vh; display: flex; align-items: center;
      background: radial-gradient(ellipse 80% 50% at 50% 100%, rgba(0,245,255,0.04) 0%, transparent 70%);
    }
    .section-inner { max-width: 900px; margin: auto; padding: 100px 60px; width: 100%; }

    .section-header { text-align: center; margin-bottom: 60px; }
    .section-tag {
      display: inline-block;
      font-family: 'Orbitron', monospace;
      font-size: 10px; letter-spacing: 5px;
      color: var(--cyan); text-shadow: var(--glow);
      border: 1px solid rgba(0,245,255,0.3);
      padding: 6px 18px; border-radius: 3px; margin-bottom: 18px;
    }
    h2.section-title {
      font-family: 'Orbitron', monospace;
      font-size: clamp(28px, 4vw, 42px); font-weight: 900; letter-spacing: 2px;
      background: linear-gradient(135deg, #fff 30%, var(--cyan) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .section-line {
      width: 60px; height: 2px;
      background: linear-gradient(to right, var(--cyan), transparent);
      margin: 20px auto 0;
    }

    .reveal {
      opacity: 0; transform: translateY(40px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* CORNER */
    .corner {
      position: absolute; width: 16px; height: 16px;
      border-color: var(--cyan); border-style: solid; opacity: 0.4;
    }
    .corner-tl { top: 14px; left: 14px; border-width: 2px 0 0 2px; }
    .corner-tr { top: 14px; right: 14px; border-width: 2px 2px 0 0; }
    .corner-bl { bottom: 14px; left: 14px; border-width: 0 0 2px 2px; }
    .corner-br { bottom: 14px; right: 14px; border-width: 0 2px 2px 0; }

    /* INFO ROW */
    .contact-info {
      display: flex; justify-content: center; gap: 50px;
      margin-bottom: 48px; flex-wrap: wrap;
    }
    .contact-info-item { text-align: center; }
    .ci-icon { font-size: 24px; display: block; margin-bottom: 6px; filter: drop-shadow(0 0 8px rgba(0,245,255,0.5)); }
    .ci-label { font-family: 'Orbitron', monospace; font-size: 9px; letter-spacing: 3px; color: var(--text-muted); }
    .ci-value { font-size: 14px; color: var(--text-main); margin-top: 3px; }

    /* FORM CARD */
    .contact-wrap {
      max-width: 580px; margin: 0 auto;
      background: rgba(0,245,255,0.02);
      border: 1px solid rgba(0,245,255,0.12);
      border-radius: 14px; padding: 50px 50px 54px;
      position: relative; overflow: hidden;
    }
    .contact-wrap::before {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 100%; height: 2px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    }
    .contact-wrap::after {
      content: '';
      position: absolute; bottom: 0; left: 0;
      width: 100%; height: 2px;
      background: linear-gradient(90deg, transparent, var(--cyan-dim), transparent);
    }

    .contact-form { display: flex; flex-direction: column; gap: 18px; }

    .input-group label {
      display: block;
      font-family: 'Orbitron', monospace; font-size: 9px; letter-spacing: 3px;
      color: var(--text-muted); margin-bottom: 7px;
    }
    input, textarea {
      width: 100%;
      background: rgba(0,245,255,0.04);
      border: 1px solid rgba(0,245,255,0.15);
      border-radius: 6px; padding: 14px 18px;
      color: var(--text-main);
      font-family: 'Rajdhani', sans-serif; font-size: 15px;
      outline: none; transition: all 0.3s;
    }
    input::placeholder, textarea::placeholder { color: var(--text-muted); opacity: 0.7; }
    input:focus, textarea:focus {
      border-color: var(--cyan);
      background: rgba(0,245,255,0.07);
      box-shadow: 0 0 0 3px rgba(0,245,255,0.08);
    }
    textarea { resize: vertical; min-height: 140px; }

    .btn-submit {
      background: transparent;
      border: 1px solid var(--cyan); color: var(--cyan);
      padding: 14px 30px;
      font-family: 'Orbitron', monospace; font-size: 12px;
      letter-spacing: 3px; font-weight: 700;
      border-radius: 4px; cursor: pointer;
      transition: all 0.3s; position: relative; overflow: hidden;
      width: 100%; margin-top: 6px;
    }
    .btn-submit::before {
      content: '';
      position: absolute; inset: 0;
      background: var(--cyan);
      transform: scaleX(0); transform-origin: left;
      transition: transform 0.3s; z-index: -1;
    }
    .btn-submit:hover::before { transform: scaleX(1); }
    .btn-submit:hover { color: #000; box-shadow: var(--glow-strong); }

    /* TOAST */
    .toast {
      display: none;
      position: fixed; bottom: 30px; right: 30px;
      background: var(--blue-card);
      border: 1px solid rgba(0,245,255,0.4);
      border-radius: 8px; padding: 16px 28px;
      font-family: 'Orbitron', monospace; font-size: 11px; letter-spacing: 2px;
      color: var(--cyan); text-shadow: var(--glow);
      box-shadow: var(--glow-strong); z-index: 5000;
      animation: toastIn 0.4s ease;
    }
    .toast.show { display: block; }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* FOOTER */
    footer {
      text-align: center; padding: 28px 20px;
      background: rgba(0,0,0,0.4);
      border-top: 1px solid rgba(0,245,255,0.08);
      font-family: 'Orbitron', monospace; font-size: 11px; letter-spacing: 2px;
      color: var(--text-muted); position: relative; z-index: 2;
    }
    footer span { color: var(--cyan); }

    @media (max-width: 768px) {
      header { padding: 14px 24px; }
      nav {display: flex !important;}
      nav a  { display: flex; }
      .section-inner { padding: 80px 24px; }
      .contact-wrap { padding: 36px 24px 40px; }
      .contact-info { gap: 24px; }
    }
    @media (max-width: 480px) {
    nav a, .navbar a, .nav-link, .menu-item, [class*="nav"] a { 
        font-size: 10px !important; 
        padding: 4px 4px !important; 
    }
    .logo, .brand, .navbar-brand {
        font-size: 14px !important;
    }
}
  </style>
</head>
<body>

<div class="grid-bg"></div>
<div class="particles" id="particles"></div>
<div class="toast" id="toast">◈ PESAN BERHASIL DIKIRIM ◈</div>

<header>
  <h1>X.1</h1>
  <nav>
    <a href="home-section-1.html">Home</a>
    <a href="about-section-1.html">About</a>
    <a href="index.html">Portofolio</a>
    <a href="team.html">Team</a>
    <a href="contact.html" class="active">Contact</a>
  </nav>
</header>

<section id="contact">
  <div class="section-inner">

    <div class="section-header reveal">
      <div class="section-tag">// GET IN TOUCH</div>
      <h2 class="section-title">Contact</h2>
      <div class="section-line"></div>
    </div>

    <!-- Info row -->
    <div class="contact-info reveal" style="transition-delay:0.1s">
      <div class="contact-info-item">
        <span class="ci-icon">📡</span>
        <div class="ci-label">STATUS</div>
        <div class="ci-value">Online & Ready</div>
      </div>
      <div class="contact-info-item">
        <span class="ci-icon">🌐</span>
        <div class="ci-label">TEAM</div>
        <div class="ci-value">Tim 4 – X.1</div>
      </div>
      <div class="contact-info-item">
        <span class="ci-icon">📅</span>
        <div class="ci-label">TAHUN</div>
        <div class="ci-value">2026</div>
      </div>
    </div>

    <!-- Form card -->
    <div class="contact-wrap reveal" style="transition-delay:0.2s">
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>

      <form class="contact-form" onsubmit="handleSubmit(event)">
        <div class="input-group">
          <label>// NAMA</label>
          <input type="text" placeholder="Nama" required>
        </div>
        <div class="input-group">
          <label>// EMAIL</label>
          <input type="email" placeholder="Email" required>
        </div>
        <div class="input-group">
          <label>// PESAN</label>
          <textarea rows="5" placeholder="Pesan"></textarea>
        </div>
        <button class="btn-submit" type="submit">◈ KIRIM ◈</button>
      </form>
    </div>

  </div>
</section>

<footer>
  <p>© 2026 <span>Tim 4</span>. All rights reserved.</p>
</footer>

<script>
  const c = document.getElementById('particles');
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.width = p.style.height = (Math.random() * 2 + 1) + 'px';
    p.style.animationDuration = (Math.random() * 15 + 10) + 's';
    p.style.animationDelay = (Math.random() * 15) + 's';
    c.appendChild(p);
  }
  const obs = new IntersectionObserver(entries =>
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }),
    { threshold: 0.12 }
  );
  document.querySelectorAll('.reveal').forEach(el => obs.observe(el));

  function handleSubmit(e) {
    e.preventDefault();
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
    e.target.reset();
  }
</script>
</body>
</html>
